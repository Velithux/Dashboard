<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>$PICSOU Token Dashboard</title>
    <meta name="description" content="Live dashboard for $PICSOU autonomous AI token on Sepolia. Real-time stats, decisions, transactions.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body data-theme="dark">
    <div class="container">
        <header>
            <div style="display: flex; align-items: center; gap: 1rem;">
                <img src="picsou.png" alt="Picsou Logo - $PICSOU Token" width="60" height="60" style="border-radius: 50%; box-shadow: 0 4px 12px rgba(0,255,136,0.3);">
                <div>
                    <h1>$PICSOU</h1>
                    <p class="subtitle">Professional Live Dashboard - Sepolia Testnet | Autonomous AI Token</p>
                </div>
            </div>
            <button id="themeToggle" class="theme-toggle" title="Toggle Dark/Light Theme" aria-label="Toggle theme">
                <span class="sun" aria-hidden="true"></span>
                <span class="moon" aria-hidden="true"></span>
            </button>
        </header>
        
        <div id="errorBanner"></div>
        
        <div class="stats-grid" id="statsGrid">
            <div class="loading card"><div class="spinner"></div>Initializing connection...</div>
        </div>
        
        <div class="decisions-section">
            <h2 class="section-header">🧠 AI Decisions Feed (Latest 10 Executed)</h2>
            <div id="decisionsList" class="list"></div>
        </div>

        <div class="tx-section">
            <h2 class="section-header">📊 Recent Transactions (Last 10)</h2>
            <div id="txList" class="list">
                <div class="loading"><div class="spinner"></div>Loading...</div>
            </div>
        </div>

        <div class="decisions-section">
            <h2 class="section-header">📈 Supply Distribution Chart</h2>
            <div class="card">
                <canvas id="burnChart" class="chart-container"></canvas>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
